<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TriniphiX</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a1020;
        color: #f8fafc;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.35), transparent 32rem),
          linear-gradient(135deg, #07111f 0%, #101827 100%);
      }

      main {
        width: min(92vw, 58rem);
        padding: 4rem;
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 2rem;
        background: rgba(15, 23, 42, 0.78);
        box-shadow: 0 2rem 6rem rgba(2, 6, 23, 0.45);
      }

      .eyebrow {
        margin: 0 0 1rem;
        color: #38bdf8;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 8vw, 6.5rem);
        line-height: 0.92;
      }

      p {
        max-width: 44rem;
        color: #cbd5e1;
        font-size: clamp(1.1rem, 2vw, 1.35rem);
        line-height: 1.7;
      }

      a {
        color: #7dd3fc;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Node.js starter</p>
      <h1>Welcome to TriniphiX.</h1>
      <p>
        This project is ready for your company website, API endpoints, and future product services.
        Start the server with <code>npm start</code>, then visit <a href="/health">/health</a>.
      </p>
    </main>
  </body>
</html>
